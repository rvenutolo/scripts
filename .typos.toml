[files]
extend-exclude = [
  "test/bats/**",
  "test/test_helper/bats-*/**",
  "other/**",
  "lib/**",
  ".shdoc/**",
  # gemset.nix is generated by bundix and is full of base32 sha256 hashes that
  # collide with English words (e.g. "pn", "wq"). Not author-written text.
  ".nix/bashcov/gemset.nix",
]

[default.extend-words]
# gir = Debian `gir1.2-*` package prefix (GObject-Introspection); not a typo.
gir = "gir"
# ba = matches the `(ba)?sh` shebang regex fragment in functions/shell_scripts.bash; not a typo.
ba = "ba"
# BRE = POSIX Basic Regular Expression (sed); not a typo of "BE"/"BRIE".
bre = "bre"
