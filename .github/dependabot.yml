version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "04:00"
      timezone: America/New_York
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      bats-submodules:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "04:00"
      timezone: America/New_York
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
