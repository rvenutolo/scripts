name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-scripts:
    name: check-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Resolve tool versions
        id: tools
        run: |
          sc=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/koalaman/shellcheck/releases/latest \
            | jq --raw-output .tag_name)
          shfmt=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/mvdan/sh/releases/latest \
            | jq --raw-output .tag_name)
          printf 'sc=%s\n' "${sc}" >> "${GITHUB_OUTPUT}"
          printf 'shfmt=%s\n' "${shfmt}" >> "${GITHUB_OUTPUT}"

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/shellcheck
            ~/.local/bin/shfmt
          key: tools-${{ runner.os }}-sc-${{ steps.tools.outputs.sc }}-shfmt-${{ steps.tools.outputs.shfmt }}

      - name: Install shellcheck
        if: steps.cache-tools.outputs.cache-hit != 'true'
        env:
          SC_VERSION: ${{ steps.tools.outputs.sc }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl --disable --fail --silent --location \
            "https://github.com/koalaman/shellcheck/releases/download/${SC_VERSION}/shellcheck-${SC_VERSION}.linux.x86_64.tar.xz" \
            | tar --extract --xz --strip-components=1 -C "${HOME}/.local/bin" \
              "shellcheck-${SC_VERSION}/shellcheck"

      - name: Install shfmt
        if: steps.cache-tools.outputs.cache-hit != 'true'
        env:
          SHFMT_VERSION: ${{ steps.tools.outputs.shfmt }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl --disable --fail --silent --location --output "${HOME}/.local/bin/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x "${HOME}/.local/bin/shfmt"

      - name: Add tools to PATH
        run: echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run check-scripts
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
        run: ./check-scripts

  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Resolve shfmt version
        id: tools
        run: |
          shfmt=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/mvdan/sh/releases/latest \
            | jq --raw-output .tag_name)
          printf 'shfmt=%s\n' "${shfmt}" >> "${GITHUB_OUTPUT}"

      - name: Cache shfmt
        id: cache-shfmt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/shfmt
          key: shfmt-${{ runner.os }}-${{ steps.tools.outputs.shfmt }}

      - name: Install shfmt
        if: steps.cache-shfmt.outputs.cache-hit != 'true'
        env:
          SHFMT_VERSION: ${{ steps.tools.outputs.shfmt }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl --disable --fail --silent --location --output "${HOME}/.local/bin/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x "${HOME}/.local/bin/shfmt"

      - name: Add tools to PATH
        run: echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install pwgen and GNU parallel
        run: sudo apt-get update && sudo apt-get install --yes pwgen parallel

      - name: Run BATS
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
        run: |
          mkdir -p bats-junit
          ./test/bats/bin/bats --jobs "$(nproc)" --recursive \
            --print-output-on-failure \
            --report-formatter junit --output bats-junit \
            test/functions

      - uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        if: always()
        with:
          report_paths: bats-junit/*.xml
          check_name: BATS results
          fail_on_failure: true

  review:
    name: reviewdog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          reporter: github-pr-review
          level: warning
          fail_on_error: false
          exclude: |
            ./other/*
            ./test/bats/*
            ./test/test_helper/bats-support/*
            ./test/test_helper/bats-assert/*
            ./lib/*
            ./.shdoc/*
      # reviewdog/action-shfmt v1.0.4 lacks an exclude option, so it would
      # flag vendored content under test/bats/, test/test_helper/bats-*/,
      # .shdoc/, and other/ that this repo does not own. Run shfmt via the
      # repo's own ./format-scripts wrapper (which uses shell_scripts::find
      # for in-scope-only enumeration) and pipe the unified diff to reviewdog.
      - uses: reviewdog/action-setup@e04ffabe3898a0af8d0fb1af00c188831c4b5893 # v1.3.2
        with:
          reviewdog_version: v0.20.3
      - name: install shfmt
        run: |
          curl --disable --fail --silent --location --show-error \
            --output "${RUNNER_TEMP}/shfmt" \
            'https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64'
          chmod +x "${RUNNER_TEMP}/shfmt"
          printf '%s\n' "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - name: shfmt review
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./format-scripts --check \
            | reviewdog -f=diff -f.diff.strip=0 \
                -name=shfmt -reporter=github-pr-review \
                -level=warning -fail-on-error=false

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          level: error
          fail_on_error: true

  lint-configs:
    name: yaml + json lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install yamllint
        run: pip install --user yamllint
      - name: Run yamllint
        run: yamllint .
      - name: Lint JSON
        run: find .github -name '*.json' -print0 | xargs --null --no-run-if-empty --max-args=1 jq empty

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !test/bats
            !test/test_helper/bats-support
            !test/test_helper/bats-assert
            !other
            !.shdoc

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2

  editorconfig:
    name: editorconfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # v2.2.0

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Install pwgen, parallel
        run: sudo apt-get update && sudo apt-get install --yes pwgen parallel

      - name: Build kcov from source
        run: |
          sudo apt-get install --yes binutils-dev libssl-dev libcurl4-openssl-dev \
            zlib1g-dev libdw-dev libiberty-dev cmake
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cd /tmp/kcov && mkdir build && cd build
          cmake .. && make && sudo make install

      - name: Resolve shfmt version
        id: tools
        run: |
          shfmt=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/mvdan/sh/releases/latest \
            | jq --raw-output .tag_name)
          printf 'shfmt=%s\n' "${shfmt}" >> "${GITHUB_OUTPUT}"

      - name: Cache shfmt
        id: cache-shfmt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/shfmt
          key: shfmt-${{ runner.os }}-${{ steps.tools.outputs.shfmt }}

      - name: Install shfmt
        if: steps.cache-shfmt.outputs.cache-hit != 'true'
        env:
          SHFMT_VERSION: ${{ steps.tools.outputs.shfmt }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl --disable --fail --silent --location --output "${HOME}/.local/bin/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x "${HOME}/.local/bin/shfmt"

      - name: Add tools to PATH
        run: echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
        with:
          ruby-version: '3.3'
      - name: Install bashcov
        run: gem install --no-document bashcov simplecov-cobertura
      - name: Run BATS under bashcov
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
        run: bashcov --root . -- ./test/bats/bin/bats --recursive test/functions
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage/coverage.xml
          fail_ci_if_error: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
