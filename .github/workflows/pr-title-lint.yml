name: pr-title-lint
# Under the merge-commit-only policy the PR title becomes the merge-commit
# subject, so it must satisfy the same Conventional Commits rules as branch
# commits (enforced by commitlint).
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-pr-title:
    name: lint-pr-title
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # shellcheck disable=SC2016 # ${PR_TITLE} must expand inside the inner
          # bash -c (which has PR_TITLE from the env: block), not the runner
          # shell — single quotes intended; this avoids PR-title injection.
          nix develop --command bash -c \
            'printf "%s\n" "${PR_TITLE}" | commitlint --config .commitlintrc.yml'
