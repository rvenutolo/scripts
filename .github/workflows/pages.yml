name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - name: Install shfmt (latest)
        run: |
          SHFMT_VERSION=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/mvdan/sh/releases/latest \
            | jq --raw-output .tag_name)
          sudo curl --disable --fail --silent --location --output /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt
      - name: Build docs
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
        run: |
          ./main/build-docs
          mkdocs build --strict
      - name: Generate BATS test count badge
        run: |
          count=$(./test/bats/bin/bats --count --recursive test/functions)
          jq --null-input --arg count "${count}" \
            '{schemaVersion: 1, label: "tests", message: $count, color: "blue"}' \
            > site/badge.json
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
