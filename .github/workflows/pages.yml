name: Pages
on:
  push:
    branches: [main]
permissions: {}
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - name: Install shfmt (latest)
        run: |
          SHFMT_VERSION=$(curl --disable --fail --silent --location \
            https://api.github.com/repos/mvdan/sh/releases/latest \
            | jq --raw-output .tag_name)
          sudo curl --disable --fail --silent --location --output /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt
      - name: Build docs
        env:
          SCRIPTS_DIR: ${{ github.workspace }}
        run: |
          ./.ci/build-docs
          mkdocs build --strict --config-file .mkdocs.yml
      - name: Generate BATS test count badge
        run: |
          count=$(./test/bats/bin/bats --count --recursive test/functions)
          jq --null-input --arg count "${count}" \
            '{schemaVersion: 1, label: "tests", message: $count, color: "blue"}' \
            > site/badge.json
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
